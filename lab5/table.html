<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
  <style type="text/tailwindcss">
    @theme {
      --color-table-header: #f9fafb;
      --color-brand-blue: #3b82f6;
    }
  </style>
</head>
<body class="bg-gray-100 p-8">

  <div class="max-w-6xl mx-auto bg-white rounded-lg shadow-sm border border-gray-200">
    <div class="flex justify-between items-center p-4 border-b border-gray-100">
        <div class="flex items-center gap-2 text-gray-400">
            <input type="checkbox" class="w-4 h-4 rounded border-gray-300">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24">
                <path fill="currentColor" d="m12 15.4l-6-6L7.4 8l4.6 4.6L16.6 8L18 9.4z"/>
            </svg>
        </div>
        <div class="flex gap-4 text-sm font-medium text-gray-600">
            <div class="flex items-center gap-1 cursor-pointer hover:text-gray-900">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"><rect width="8.25" height="11.5" x="1.75" y="2.75"/><path d="m10 3.75 4.25 2-4.25 7.5"/></g></svg>
                Display
            </div>
            <div class="flex items-center gap-1 cursor-pointer hover:text-gray-900">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M7 12h10m-6 6h2"/></svg>
                Sort by
            </div>
            <div class="flex items-center gap-1 cursor-pointer hover:text-gray-900">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 12a1 1 0 1 0 2 0a1 1 0 1 0-2 0m0 7a1 1 0 1 0 2 0a1 1 0 1 0-2 0m0-14a1 1 0 1 0 2 0a1 1 0 1 0-2 0"/></svg>
                Actions
            </div>
        </div>
    </div>

    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead class="bg-table-header text-gray-500 text-[13px] tracking-wider">
          <tr>
            <th class="p-4 w-12"></th>
            <th class="p-4 font-medium border-r border-gray-100">Address</th>
            <th class="p-4 font-medium text-center">Skip-Traced?</th>
            <th class="p-4 font-medium text-center">
            <div class="flex items-center justify-center gap-1">
                Deal Type
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24">
                <path fill="currentColor" d="M11 17h2v-6h-2zm1.713-8.287Q13 8.425 13 8t-.288-.712T12 7t-.712.288T11 8t.288.713T12 9t.713-.288M12 22q-2.075 0-3.9-.788t-3.175-2.137T2.788 15.9T2 12t.788-3.9t2.137-3.175T8.1 2.788T12 2t3.9.788t3.175 2.137T21.213 8.1T22 12t-.788 3.9t-2.137 3.175t-3.175 2.138T12 22m0-2q3.35 0 5.675-2.325T20 12t-2.325-5.675T12 4T6.325 6.325T4 12t2.325 5.675T12 20m0-8"/>
                </svg>
            </div>
            </th>            
            <th class="p-4 font-medium">Est Price/SqFt</th>
            <th class="p-4 font-medium">
            <div class="flex items-center gap-1">
                Motivation(s)
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24">
                <path fill="currentColor" d="M11 17h2v-6h-2zm1.713-8.287Q13 8.425 13 8t-.288-.712T12 7t-.712.288T11 8t.288.713T12 9t.713-.288M12 22q-2.075 0-3.9-.788t-3.175-2.137T2.788 15.9T2 12t.788-3.9t2.137-3.175T8.1 2.788T12 2t3.9.788t3.175 2.137T21.213 8.1T22 12t-.788 3.9t-2.137 3.175t-3.175 2.138T12 22m0-2q3.35 0 5.675-2.325T20 12t-2.325-5.675T12 4T6.325 6.325T4 12t2.325 5.675T12 20m0-8"/>
                </svg>
            </div>
            </th>            
            <th class="p-4 font-medium">Property Status</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-100 text-[14px]">
          <tr class="hover:bg-gray-50 transition-colors">
            <td class="p-4 text-center"><input type="checkbox" class="rounded border-gray-300"></td>
            <td class="p-4 border-r border-gray-100">
              <div class="flex justify-between items-start">
                <div>
                    <a href="#" class="text-gray-800 font-bold underline decoration-gray-400">5418 W WASHINGTON BLVD</a>
                    <p class="text-gray-400 text-xs mt-0.5">LOS ANGELES, CA, 90016</p>
                </div>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48"><defs><mask id="SVGXO0C8tfp"><g fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round" stroke-width="4"><path d="M39 6H9a3 3 0 0 0-3 3v30a3 3 0 0 0 3 3h30a3 3 0 0 0 3-3V9a3 3 0 0 0-3-3"/><path fill="#555" d="M18 23a5 5 0 1 0 0-10a5 5 0 0 0 0 10"/><path d="M42 36L31 26l-10 9l-7-6l-8 6"/></g></mask></defs><path fill="#9ca3af" d="M0 0h48v48H0z" mask="url(#SVGXO0C8tfp)"/></svg>              
            </div>
            </td>
            <td class="p-4 text-center">
                <button class="text-gray-400 hover:text-brand-blue cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 256 256"><path fill="currentColor" d="M152 112a8 8 0 0 1-8 8h-24v24a8 8 0 0 1-16 0v-24H80a8 8 0 0 1 0-16h24V80a8 8 0 0 1 16 0v24h24a8 8 0 0 1 8 8m77.66 117.66a8 8 0 0 1-11.32 0l-50.06-50.07a88.11 88.11 0 1 1 11.31-11.31l50.07 50.06a8 8 0 0 1 0 11.32M112 184a72 72 0 1 0-72-72a72.08 72.08 0 0 0 72 72"/></svg>
                </button>
            </td>
            <td class="p-4 text-center text-gray-700">0</td>
            <td class="p-4 text-gray-700"></td>
            <td class="p-4 text-gray-700">8</td>
            <td class="p-4 text-gray-700">Off Market (Motivated)</td>
          
          </tbody>
      </table>
    </div>
  </div>

</body>
</html>
